name: Detect touched workspaces
description: Detect changed files and derive impacted workspace and validation targets for the monorepo.

inputs:
  base-sha:
    description: Optional base commit SHA to compare from.
    required: false
    default: ''
  head-sha:
    description: Optional head commit SHA to compare to.
    required: false
    default: ''
  diff-filter:
    description: Git diff filter passed to git diff --diff-filter.
    required: false
    default: ACMRT

outputs:
  diff-range:
    description: Resolved git diff range used for detection.
    value: ${{ steps.detect.outputs.diff-range }}
  changed-files:
    description: Newline-delimited list of changed files.
    value: ${{ steps.detect.outputs.changed-files }}
  impacted-workspaces:
    description: Newline-delimited list of workspaces with changed files.
    value: ${{ steps.detect.outputs.impacted-workspaces }}
  schema-dirs:
    description: Newline-delimited list of changed schema directories.
    value: ${{ steps.detect.outputs.schema-dirs }}
  biome-targets:
    description: Newline-delimited list of Biome targets affected by the changed files.
    value: ${{ steps.detect.outputs.biome-targets }}
  has-changed-files:
    description: Whether any files changed in the resolved diff.
    value: ${{ steps.detect.outputs.has-changed-files }}
  has-impacted-workspaces:
    description: Whether any workspaces were impacted by the resolved diff.
    value: ${{ steps.detect.outputs.has-impacted-workspaces }}
  has-schema-dirs:
    description: Whether any schema directories were impacted by the resolved diff.
    value: ${{ steps.detect.outputs.has-schema-dirs }}
  has-biome-targets:
    description: Whether any Biome targets were impacted by the resolved diff.
    value: ${{ steps.detect.outputs.has-biome-targets }}

runs:
  using: composite
  steps:
    - name: Detect touched paths
      id: detect
      shell: bash
      env:
        INPUT_BASE_SHA: ${{ inputs.base-sha }}
        INPUT_HEAD_SHA: ${{ inputs.head-sha }}
        INPUT_DIFF_FILTER: ${{ inputs.diff-filter }}
        EVENT_NAME: ${{ github.event_name }}
        GITHUB_SHA_CONTEXT: ${{ github.sha }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        PUSH_BEFORE_SHA: ${{ github.event.before }}
      run: |
        set -euo pipefail

        EMPTY_TREE="4b825dc642cb6eb9a060e54bf8d69288fbee4904"
        ZERO_SHA="0000000000000000000000000000000000000000"

        base_sha="$INPUT_BASE_SHA"
        head_sha="$INPUT_HEAD_SHA"

        if [[ -z "$head_sha" ]]; then
          if [[ "$EVENT_NAME" == 'pull_request' && -n "$PR_HEAD_SHA" ]]; then
            head_sha="$PR_HEAD_SHA"
          else
            head_sha="$GITHUB_SHA_CONTEXT"
          fi
        fi

        if [[ -z "$base_sha" ]]; then
          if [[ "$EVENT_NAME" == 'pull_request' && -n "$PR_BASE_SHA" ]]; then
            base_sha="$PR_BASE_SHA"
          elif [[ "$EVENT_NAME" == 'push' && -n "$PUSH_BEFORE_SHA" && "$PUSH_BEFORE_SHA" != "$ZERO_SHA" ]]; then
            base_sha="$PUSH_BEFORE_SHA"
          elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            base_sha="$(git rev-parse HEAD^)"
          else
            base_sha="$EMPTY_TREE"
          fi
        fi

        if [[ "$base_sha" != "$EMPTY_TREE" ]]; then
          if ! git cat-file -e "${base_sha}^{commit}" 2>/dev/null; then
            echo "::error::Base commit $base_sha is not available locally. Use actions/checkout with fetch-depth: 0 or pass a reachable base-sha."
            exit 1
          fi
        fi

        if ! git cat-file -e "${head_sha}^{commit}" 2>/dev/null; then
          echo "::error::Head commit $head_sha is not available locally."
          exit 1
        fi

        mapfile -t changed_files < <(git diff --name-only --diff-filter="$INPUT_DIFF_FILTER" "$base_sha" "$head_sha" | sed '/^$/d' | sort -u)

        impacted_workspaces=()
        for workspace_root in apps common webs; do
          [[ -d "$workspace_root" ]] || continue
          while IFS= read -r workspace_dir; do
            [[ -f "$workspace_dir/package.json" ]] || continue
            if [[ ${#changed_files[@]} -gt 0 ]] && printf '%s\n' "${changed_files[@]}" | grep -q "^${workspace_dir}/"; then
              impacted_workspaces+=("$workspace_dir")
            fi
          done < <(find "$workspace_root" -mindepth 1 -maxdepth 1 -type d | sort)
        done

        schema_dirs=()
        if [[ ${#changed_files[@]} -gt 0 ]] && printf '%s\n' "${changed_files[@]}" | grep -q '^common/schemas/'; then
          schema_dirs+=("common/schemas")
        fi

        if [[ ${#changed_files[@]} -gt 0 ]]; then
          while IFS= read -r schema_dir; do
            [[ -n "$schema_dir" ]] || continue
            schema_dirs+=("$schema_dir")
          done < <(printf '%s\n' "${changed_files[@]}" | grep -oE '^apps/[^/]+/schemas/' | sed 's|/$||' | sort -u)
        fi

        biome_targets=()

        add_biome_target() {
          local target="$1"
          [[ -d "$target" ]] || return 0
          biome_targets+=("$target")
        }

        if [[ ${#changed_files[@]} -gt 0 ]] && printf '%s\n' "${changed_files[@]}" | grep -q '^common/vanilla/iso/'; then
          add_biome_target "common/vanilla/iso"
        fi
        if [[ ${#changed_files[@]} -gt 0 ]] && printf '%s\n' "${changed_files[@]}" | grep -q '^common/compiled/node/'; then
          add_biome_target "common/compiled/node"
        fi
        if [[ ${#changed_files[@]} -gt 0 ]] && printf '%s\n' "${changed_files[@]}" | grep -q '^common/schemas/'; then
          add_biome_target "common/schemas"
        fi
        if [[ ${#changed_files[@]} -gt 0 ]] && printf '%s\n' "${changed_files[@]}" | grep -q '^common/compiled/vue/'; then
          add_biome_target "common/compiled/vue"
        fi
        if [[ ${#changed_files[@]} -gt 0 ]] && printf '%s\n' "${changed_files[@]}" | grep -q '^common/vanilla/web/'; then
          add_biome_target "common/vanilla/web"
        fi
        if [[ ${#changed_files[@]} -gt 0 ]] && printf '%s\n' "${changed_files[@]}" | grep -q '^apps/'; then
          add_biome_target "apps"
        fi
        if [[ ${#changed_files[@]} -gt 0 ]] && printf '%s\n' "${changed_files[@]}" | grep -q '^webs/'; then
          add_biome_target "webs"
        fi
        if [[ ${#changed_files[@]} -gt 0 ]] && printf '%s\n' "${changed_files[@]}" | grep -q '^scripts/'; then
          add_biome_target "scripts"
        fi

        dedupe_lines() {
          if [[ $# -eq 0 ]]; then
            return 0
          fi
          printf '%s\n' "$@" | sed '/^$/d' | sort -u
        }

        write_multiline_output() {
          local key="$1"
          shift
          {
            echo "$key<<EOF"
            if [[ $# -gt 0 ]]; then
              dedupe_lines "$@"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        }

        echo "diff-range=${base_sha}..${head_sha}" >> "$GITHUB_OUTPUT"
        write_multiline_output "changed-files" "${changed_files[@]:-}"
        write_multiline_output "impacted-workspaces" "${impacted_workspaces[@]:-}"
        write_multiline_output "schema-dirs" "${schema_dirs[@]:-}"
        write_multiline_output "biome-targets" "${biome_targets[@]:-}"

        if [[ ${#changed_files[@]} -gt 0 ]]; then
          echo "has-changed-files=true" >> "$GITHUB_OUTPUT"
        else
          echo "has-changed-files=false" >> "$GITHUB_OUTPUT"
        fi

        if [[ ${#impacted_workspaces[@]} -gt 0 ]]; then
          echo "has-impacted-workspaces=true" >> "$GITHUB_OUTPUT"
        else
          echo "has-impacted-workspaces=false" >> "$GITHUB_OUTPUT"
        fi

        if [[ ${#schema_dirs[@]} -gt 0 ]]; then
          echo "has-schema-dirs=true" >> "$GITHUB_OUTPUT"
        else
          echo "has-schema-dirs=false" >> "$GITHUB_OUTPUT"
        fi

        if [[ ${#biome_targets[@]} -gt 0 ]]; then
          echo "has-biome-targets=true" >> "$GITHUB_OUTPUT"
        else
          echo "has-biome-targets=false" >> "$GITHUB_OUTPUT"
        fi
