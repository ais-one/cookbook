name: Detect Change Scope
description: Detect changed files for push, pull_request, or manual runs and evaluate allowed path scope.

inputs:
  allowed-paths-regex:
    description: Regex fragments (without ^$ anchors) for allowed paths, e.g. 'apps/|webs/|common/|scripts/'.
    required: true
  disallowed-paths-regex:
    description: Regex for explicitly disallowed paths. Files matching this fail before the allowed-paths check.
    required: false
    default: ''
  fail-on-invalid:
    description: If true, fail the step when any changed file is outside allowed scope.
    required: false
    default: 'false'
  invalid-scope-message:
    description: Error message shown when fail-on-invalid is true and invalid files are found.
    required: false
    default: Changed files are outside the allowed scope.
  diff-filter:
    description: Git diff filter to use when collecting changed files.
    required: false
    default: ACMRT

outputs:
  diff_range:
    description: Git diff range used for this run.
    value: ${{ steps.detect.outputs.diff_range }}
  changed_files:
    description: Newline-delimited list of changed files.
    value: ${{ steps.detect.outputs.changed_files }}
  invalid_files:
    description: Newline-delimited list of changed files outside allowed scope.
    value: ${{ steps.detect.outputs.invalid_files }}
  has_invalid_files:
    description: True when at least one changed file is outside allowed scope.
    value: ${{ steps.detect.outputs.has_invalid_files }}
  has_common_scripts:
    description: True when changed files include common/ or scripts/.
    value: ${{ steps.detect.outputs.has_common_scripts }}
  has_apps:
    description: True when changed files include apps/.
    value: ${{ steps.detect.outputs.has_apps }}
  has_supported_scope:
    description: True when changed files exist and all are inside allowed scope.
    value: ${{ steps.detect.outputs.has_supported_scope }}

runs:
  using: composite
  steps:
    - name: Detect scope
      id: detect
      shell: bash
      env:
        ALLOWED_PATHS_REGEX: ${{ inputs.allowed-paths-regex }}
        DISALLOWED_PATHS_REGEX: ${{ inputs.disallowed-paths-regex }}
        FAIL_ON_INVALID: ${{ inputs.fail-on-invalid }}
        INVALID_SCOPE_MESSAGE: ${{ inputs.invalid-scope-message }}
        DIFF_FILTER: ${{ inputs.diff-filter }}
        DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        PUSH_BEFORE_SHA: ${{ github.event.before }}
        PUSH_HEAD_SHA: ${{ github.sha }}
      run: |
        set -euo pipefail

        EMPTY_TREE=4b825dc642cb6eb9a060e54bf8d69288fbee4904

        if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
          RANGE="${PR_BASE_SHA}..${PR_HEAD_SHA}"
        elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
          if [[ "${PUSH_BEFORE_SHA}" == "0000000000000000000000000000000000000000" ]]; then
            RANGE="${EMPTY_TREE}..${PUSH_HEAD_SHA}"
          else
            RANGE="${PUSH_BEFORE_SHA}..${PUSH_HEAD_SHA}"
          fi
        else
          git fetch origin "${DEFAULT_BRANCH}" --depth=1
          RANGE="origin/${DEFAULT_BRANCH}...HEAD"
        fi

        CHANGED_FILES="$(git diff --name-only --diff-filter="${DIFF_FILTER}" "${RANGE}" | sed '/^$/d' | sort -u)"

        if [[ -n "${DISALLOWED_PATHS_REGEX}" && -n "${CHANGED_FILES}" ]]; then
          DISALLOWED_FILES="$(printf '%s\n' "${CHANGED_FILES}" | grep -E "^(${DISALLOWED_PATHS_REGEX})" || true)"
          if [[ -n "${DISALLOWED_FILES}" ]]; then
            echo "${INVALID_SCOPE_MESSAGE}"
            printf '%s\n' "${DISALLOWED_FILES}"
            exit 1
          fi
        fi

        INVALID_FILES=""
        HAS_INVALID_FILES=false
        HAS_COMMON_SCRIPTS=false
        HAS_APPS=false
        HAS_SUPPORTED_SCOPE=false

        if [[ -n "${CHANGED_FILES}" ]]; then
          INVALID_FILES="$(printf '%s\n' "${CHANGED_FILES}" | grep -Ev "^(${ALLOWED_PATHS_REGEX})" || true)"

          if [[ -n "${INVALID_FILES}" ]]; then
            HAS_INVALID_FILES=true
          else
            HAS_SUPPORTED_SCOPE=true
          fi

          if printf '%s\n' "${CHANGED_FILES}" | grep -Eq '^(common/|scripts/)'; then
            HAS_COMMON_SCRIPTS=true
          fi

          if printf '%s\n' "${CHANGED_FILES}" | grep -Eq '^(apps/|webs/)'; then
            HAS_APPS=true
          fi
        fi

        if [[ "${HAS_INVALID_FILES}" == true && "${FAIL_ON_INVALID}" == 'true' ]]; then
          echo "${INVALID_SCOPE_MESSAGE}"
          printf '%s\n' "${INVALID_FILES}"
          exit 1
        fi

        {
          echo "diff_range=${RANGE}"
          echo "has_invalid_files=${HAS_INVALID_FILES}"
          echo "has_common_scripts=${HAS_COMMON_SCRIPTS}"
          echo "has_apps=${HAS_APPS}"
          echo "has_supported_scope=${HAS_SUPPORTED_SCOPE}"
          echo "changed_files<<__EOF__"
          printf '%s\n' "${CHANGED_FILES}"
          echo "__EOF__"
          echo "invalid_files<<__EOF__"
          printf '%s\n' "${INVALID_FILES}"
          echo "__EOF__"
        } >> "${GITHUB_OUTPUT}"
