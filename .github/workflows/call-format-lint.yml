name: Call - Biome

on:
  workflow_call:

jobs:
  format-lint:
    name: Biome Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: ./.github/actions/checkout

      - name: Detect touched paths
        id: touched
        uses: ./.github/actions/detect-touched-workspaces

      - name: Set up workspace
        uses: ./.github/actions/setup-node-npm-install

      - name: Biome CI for touched targets
        if: steps.touched.outputs.has-biome-targets == 'true'
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r target; do
            [ -n "$target" ] || continue
            echo "Running Biome CI for $target"
            npx biome ci "$target"
          done <<< "${{ steps.touched.outputs.biome-targets }}"

      - name: No touched Biome targets
        if: steps.touched.outputs.has-biome-targets != 'true'
        run: echo "No touched Biome targets detected for ${{ steps.touched.outputs.diff-range }}"
