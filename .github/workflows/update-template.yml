name: Sync Upstream Template
# Pulls the latest changes from the upstream template repository and opens a PR
# with the diff, excluding app-specific folders that should never be overwritten.
#
# Process:
#   1. Checks out this repo.
#   2. Adds the upstream template as a git remote and fetches it.
#   3. Merges upstream into the working tree (--no-commit) — handles additions,
#      modifications, and deletions. Conflict markers are left for the PR reviewer.
#   4. Restores apps/, scripts/, local-*.yml workflows, and local-* actions from HEAD so local customisations are preserved.
#   5. If any files changed, opens a PR on branch chore/sync-upstream for review.
#
# Trigger: run manually via workflow_dispatch.
# Protected branches: safe — changes are pushed to chore/sync-upstream, never directly
#   to the target branch. A human reviews and merges the PR as normal.
#
# Required secret: SYNC_TOKEN
#   The built-in GITHUB_TOKEN cannot create or update workflow files (.github/workflows/).
#   A personal access token with both `repo` and `workflow` scopes is required instead.
#
#   Setup:
#     Classic PAT:
#       1. GitHub → Settings → Developer settings → Personal access tokens → Tokens (classic)
#       2. Generate new token → tick BOTH `repo` (for push + PR creation) AND `workflow` (for
#          writing .github/workflows/ files) — these are separate scopes; neither implies the other
#       3. Copy the token value.
#
#     Fine-grained PAT (repo-scoped):
#       1. GitHub → Settings → Developer settings → Personal access tokens → Fine-grained tokens
#       2. Set Resource owner to the repo's owner, Important! Names must match
#       3. Under Permissions → Repository permissions, grant:
#            - Contents: Read and write
#            - Pull requests: Read and write
#            - Workflows: Read and write
#       4. Copy the token value.
#
#     Add to repo:
#       Repository → Settings → Secrets and variables → Actions → New repository secret
#       Name: SYNC_TOKEN   Value: <token copied above>

on:
  # schedule:
  #   - cron: '0 9 * * 1'  # every Monday 9am UTC
  workflow_dispatch:
    inputs:
      upstream_branch:
        description: 'Upstream branch to sync from. Defaults to main'
        default: 'main'
        required: false
      ref:
        description: Branch to check out. Defaults to the ref that triggered the workflow.
        required: false
        default: ''

env:
  UPSTREAM_URL: https://github.com/ais-one/novex-kit.git

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Display Inputs
        run: echo "${{ toJSON(github.event.inputs) }}"

      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          ref: ${{ github.event.inputs.ref }}

      # Merge upstream into the working tree without committing.
      # apps/ and scripts/ are protected via .git/info/attributes (never tracked,
      # no restore needed) so git never touches those paths during the merge.
      # Conflicts outside protected folders are auto-resolved in favour of upstream
      # (-X theirs); the PR diff is the review mechanism.
      - name: Merge upstream changes (exclude apps/ scripts/)
        env:
          SYNC_BRANCH: chore/sync-upstream
          UPSTREAM_BRANCH: ${{ github.event.inputs.upstream_branch || 'main' }}
        run: |
          git remote add upstream ${{ env.UPSTREAM_URL }}
          git fetch upstream
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config merge.ours.driver true
          printf 'apps/** merge=ours\nscripts/** merge=ours\n.github/workflows/local-*.yml merge=ours\n.github/actions/local-** merge=ours\n' >> .git/info/attributes
          git checkout -B "$SYNC_BRANCH"
          git merge upstream/"$UPSTREAM_BRANCH" --no-commit --no-ff --allow-unrelated-histories -X theirs || true

      # Explicitly remove files that were deleted in upstream but still exist in HEAD,
      # outside the protected folders. The merge step alone does not guarantee this when
      # it exits with conflicts and the index is left in a partial state.
      - name: Remove upstream-deleted files (outside protected folders)
        env:
          UPSTREAM_BRANCH: ${{ github.event.inputs.upstream_branch || 'main' }}
        run: |
          comm -23 \
            <(git ls-tree -r --name-only HEAD | grep -v -E '^(apps|scripts)/|^\.github/(workflows/local-|actions/local-)' | sort) \
            <(git ls-tree -r --name-only upstream/"$UPSTREAM_BRANCH" | grep -v -E '^(apps|scripts)/|^\.github/(workflows/local-|actions/local-)' | sort) \
          | xargs -r git rm -f --

      # # Alternative: file-copy approach (does not handle upstream deletions natively)
      # # Checkout reference:
      # #   single file  — git checkout upstream/main -- path/to/file
      # #   folder       — git checkout upstream/main -- folder/   (no wildcards)
      # #   *.ext        — git checkout upstream/main -- 'folder/*.ext'
      # #   recursive    — git checkout upstream/main -- 'folder/**/*.ext'
      # - name: Apply upstream changes (exclude apps/ scripts/)
      #   run: |
      #     git checkout upstream/${{ github.event.inputs.upstream_branch || 'main' }} -- .
      #     git checkout HEAD -- apps/ scripts/
      #
      # - name: Remove workflow/action files deleted upstream
      #   run: |
      #     git diff HEAD upstream/${{ github.event.inputs.upstream_branch || 'main' }} \
      #       --diff-filter=D --name-only \
      #       | grep -E '^\.github/(workflows|actions)/' \
      #       | xargs -r git rm -f --

      # - name: Check for changes
      #   id: changes
      #   run: |
      #     if git diff --staged --quiet && git diff --quiet; then
      #       echo "has_changes=false" >> $GITHUB_OUTPUT
      #       echo "has_changes=false"
      #     else
      #       echo "has_changes=true" >> $GITHUB_OUTPUT
      #       echo "has_changes=true"
      #     fi

      - name: Push sync branch
        env:
          SYNC_BRANCH: chore/sync-upstream
        run: |
          git add -A
          git commit -m "chore: sync from upstream template"
          git push origin "$SYNC_BRANCH" --force
