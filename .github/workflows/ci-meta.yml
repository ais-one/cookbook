# CI Meta workflow validates repository meta changes.
# Scope: .github/workflows/**, .github/actions/**.
# Branch flow: chore/ci/* -> ci-staging -> main.
name: CI Meta

on:
  # push:
  #   branches:
  #     - 'chore/ci/**'
  #   paths:
  #     - '.github/workflows/**'
  #     - '.github/actions/**'
  # pull_request:
  #   branches:
  #     - ci-staging
  #     - main
  #   paths:
  #     - '.github/workflows/**'
  #     - '.github/actions/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  commit-lint:
    name: Commit Message Format
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    uses: ./.github/workflows/call-commit-lint.yml

  validate-branch-flow:
    name: Validate Branch Flow
    runs-on: ubuntu-latest
    steps:
      - name: Validate CI branch flow
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            if [[ "${GITHUB_REF_NAME}" != chore/ci/* ]]; then
              echo "Pushes for this workflow must use a chore/ci/* branch."
              exit 1
            fi
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            if [[ "${GITHUB_BASE_REF}" == "ci-staging" && "${GITHUB_HEAD_REF}" != chore/ci/* ]]; then
              echo "PRs into ci-staging must come from a chore/ci/* branch."
              exit 1
            fi

            if [[ "${GITHUB_BASE_REF}" == "main" && "${GITHUB_HEAD_REF}" != "ci-staging" ]]; then
              echo "PRs into main must come from ci-staging."
              exit 1
            fi
          fi

  validate-file-scope:
    name: Validate CI File Scope
    needs: validate-branch-flow
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: ./.github/actions/checkout

      - name: Detect changed scope
        id: scope
        uses: ./.github/actions/detect-change-scope
        with:
          allowed-paths-regex: \.github/workflows/|\.github/actions/
          fail-on-invalid: 'true'
          invalid-scope-message: Only .github/workflows/** and .github/actions/** may change in this workflow.

  lint-github-yaml:
    name: Lint Workflow YAML
    needs: validate-file-scope
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: ./.github/actions/checkout

      - name: Set up workspace
        uses: ./.github/actions/setup-node-npm-install

      - name: Check workflow and action YAML
        shell: bash
        run: |
          set -euo pipefail
          npx prettier@3 --check ".github/workflows/**/*.yml" ".github/actions/**/*.yml"

      - name: Lint workflows
        uses: docker://rhysd/actionlint:latest
        # uses: rhysd/actionlint@v1
