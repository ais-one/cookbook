name: Wfc - Commit Lint

on:
  workflow_call:

jobs:
  commit-lint:
    name: Commit Message Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: ./.github/actions/checkout

      - name: Validate commit messages
        shell: bash
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          PATTERN='^(feat|fix|chore)(\([^)]+\))?!?: .{1,}$'
          FAILED=0

          if [[ "$GITHUB_EVENT_NAME" == 'pull_request' ]]; then
            RANGE="$PR_BASE_SHA..$PR_HEAD_SHA"
            git log --format="%s" "$RANGE" > /tmp/commit_msgs.txt
          elif [[ "$PUSH_BEFORE_SHA" == '0000000000000000000000000000000000000000' ]]; then
            git log --format="%s" -n 1 "$PUSH_HEAD_SHA" > /tmp/commit_msgs.txt
          else
            RANGE="$PUSH_BEFORE_SHA..$PUSH_HEAD_SHA"
            git log --format="%s" "$RANGE" > /tmp/commit_msgs.txt
          fi

          while IFS= read -r msg; do
            case "$msg" in
              Merge\ *|fixup!\ *|squash!\ *) continue ;;
            esac
            if ! echo "$msg" | grep -Eq "$PATTERN"; then
              echo "::error::Non-conventional commit message: $msg"
              echo "  Expected: type(scope): description"
              echo "  Types:    feat|fix|chore"
              echo "  Note:     use chore for docs|style|refactor|perf|test|build|ci|revert changes"
              echo "  Tip:      use 'npx czg' locally to generate a valid message."
              FAILED=1
            fi
          done < /tmp/commit_msgs.txt
          exit $FAILED
