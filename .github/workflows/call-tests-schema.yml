name: Call - Schema Tests

on:
  workflow_call:

jobs:
  schema-tests:
    name: Schema Validation Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: ./.github/actions/checkout

      - name: Detect touched paths
        id: touched
        uses: ./.github/actions/detect-touched-workspaces

      - name: Set up workspace
        uses: ./.github/actions/setup-node-npm-install

      - name: Schema tests for touched schema directories
        if: steps.touched.outputs.has-schema-dirs == 'true'
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r dir; do
            [ -n "$dir" ] || continue
            echo "Running schema tests for $dir"
            npm run test:schemas -- "$dir"
          done <<< "${{ steps.touched.outputs.schema-dirs }}"

      - name: No touched schema directories
        if: steps.touched.outputs.has-schema-dirs != 'true'
        run: echo "No touched schema directories detected for ${{ steps.touched.outputs.diff-range }}"
