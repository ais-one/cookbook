name: Call - Unit Tests

on:
  workflow_call:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: ./.github/actions/checkout

      - name: Detect touched paths
        id: touched
        uses: ./.github/actions/detect-touched-workspaces

      - name: Set up workspace
        uses: ./.github/actions/setup-node-npm-install

      - name: Run unit tests for touched workspaces
        if: steps.touched.outputs.has-impacted-workspaces == 'true'
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r workspace; do
            [ -n "$workspace" ] || continue
            if node -e "const p=require('./${workspace}/package.json'); process.exit(p.scripts&&p.scripts['test:unit']?0:1)" 2>/dev/null; then
              echo "Running unit tests for workspace: $workspace"
              npm run test:unit --workspace="$workspace"
            else
              echo "No test:unit script in workspace: $workspace - skipping"
            fi
          done <<< "${{ steps.touched.outputs.impacted-workspaces }}"

      - name: No impacted workspaces
        if: steps.touched.outputs.has-impacted-workspaces != 'true'
        run: echo "No impacted workspaces detected – skipping unit tests"
