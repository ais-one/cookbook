# .github/workflows/terraform-alicloud.yml
name: Terraform (AliCloud)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Required for OIDC token issuance
permissions:
  id-token: write   # allows the job to request a JWT from GitHub's OIDC provider
  contents: read

env:
  TF_VERSION: "1.9.0"
  ALICLOUD_REGION: "cn-hangzhou"
  ROLE_ARN: "acs:ram::123456789012345678:role/cicd-terraform-role"
  OIDC_PROVIDER_ARN: "acs:ram::123456789012345678:oidc-provider/github-actions"

jobs:
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Get the GitHub-issued OIDC JWT token
      - name: Get GitHub OIDC token
        id: oidc
        run: |
          TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.aliyuncs.com" | jq -r '.value')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      # Exchange the JWT for short-lived AliCloud STS credentials
      - name: Assume RAM role via OIDC
        id: sts
        run: |
          RESPONSE=$(curl -sS -X POST "https://sts.aliyuncs.com/" \
            -d "Action=AssumeRoleWithOIDC" \
            -d "Version=2015-04-01" \
            -d "Format=JSON" \
            -d "RoleArn=${{ env.ROLE_ARN }}" \
            -d "OIDCProviderArn=${{ env.OIDC_PROVIDER_ARN }}" \
            -d "OIDCToken=${{ steps.oidc.outputs.token }}" \
            -d "RoleSessionName=github-actions-terraform" \
            -d "DurationSeconds=3600")

          echo "access_key=$(echo $RESPONSE | jq -r '.Credentials.AccessKeyId')"     >> $GITHUB_OUTPUT
          echo "secret_key=$(echo $RESPONSE | jq -r '.Credentials.AccessKeySecret')" >> $GITHUB_OUTPUT
          echo "token=$(echo $RESPONSE | jq -r '.Credentials.SecurityToken')"         >> $GITHUB_OUTPUT

      # Inject short-lived credentials as env vars for Terraform
      - name: Set AliCloud credentials
        run: |
          echo "ALICLOUD_ACCESS_KEY=${{ steps.sts.outputs.access_key }}"   >> $GITHUB_ENV
          echo "ALICLOUD_SECRET_KEY=${{ steps.sts.outputs.secret_key }}"   >> $GITHUB_ENV
          echo "ALICLOUD_SECURITY_TOKEN=${{ steps.sts.outputs.token }}"    >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        env:
          ALICLOUD_REGION: ${{ env.ALICLOUD_REGION }}

      - name: Terraform Format check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      # Apply only on push to main (not on PRs)
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan
