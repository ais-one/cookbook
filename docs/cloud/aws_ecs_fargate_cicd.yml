# .github/workflows/deploy-ecs.yml
#
# Triggered on push to main (or manually).
# Steps:
#   1. Exchange GitHub OIDC JWT for short-lived AWS credentials
#   2. Build container image, push to ECR
#   3. Register a new ECS task definition revision with the new image
#   4. Trigger a rolling ECS service deployment and wait for stability
#   5. Optionally invalidate CloudFront cache after a static deploy
#
name: Deploy to ECS

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - '.github/workflows/deploy-ecs.yml'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (leave blank to build from HEAD)'
        required: false

permissions:
  id-token: write   # required for OIDC JWT issuance
  contents: read

env:
  AWS_REGION:       "ap-southeast-1"
  ROLE_ARN:         "arn:aws:iam::123456789012:role/cicd-terraform-role"
  ECR_REPO:         "123456789012.dkr.ecr.ap-southeast-1.amazonaws.com/myapp/app-ecs"
  ECS_CLUSTER:      "myapp-prod"
  ECS_SERVICE:      "myapp-api"
  TASK_FAMILY:      "myapp-prod-app"
  CONTAINER_NAME:   "myapp-api"
  CF_DISTRIBUTION:  "EXXXXXXXXXXXXXXXXX"   # from terraform output cloudfront_distribution_id

jobs:
  # ============================================================
  # Job 1: Build and push image to ECR
  # ============================================================
  build-and-push:
    name: Build & push to ECR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_uri: ${{ steps.meta.outputs.uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-build-${{ github.run_id }}

      - name: Resolve image tag
        id: meta
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          else
            TAG="sha-${GITHUB_SHA::8}"
          fi
          URI="${{ env.ECR_REPO }}:${TAG}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "uri=$URI" >> $GITHUB_OUTPUT
          echo "Image URI: $URI"

      - name: Login to ECR
        id: ecr_login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build \
            --tag "${{ steps.meta.outputs.uri }}" \
            --cache-from "${{ env.ECR_REPO }}:cache" \
            --label "git.sha=${{ github.sha }}" \
            --label "build.run=${{ github.run_id }}" \
            .

      - name: Push to ECR
        run: |
          docker push "${{ steps.meta.outputs.uri }}"

          # Update the mutable :cache tag for layer caching
          docker tag "${{ steps.meta.outputs.uri }}" "${{ env.ECR_REPO }}:cache"
          docker push "${{ env.ECR_REPO }}:cache"

  # ============================================================
  # Job 2: Register new task def + rolling deploy to ECS
  # ============================================================
  deploy-ecs:
    name: Rolling deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production   # optional: require manual approval in repo settings

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-deploy-${{ github.run_id }}

      # Pull the current task definition and patch the image URI
      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.TASK_FAMILY }} \
            --query taskDefinition \
            --output json > task-def.json

      - name: Update image in task definition
        id: task_def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name:  ${{ env.CONTAINER_NAME }}
          image:           ${{ needs.build-and-push.outputs.image_uri }}

      # Register the new revision and deploy — waits for service stability
      - name: Deploy to ECS (rolling)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:       ${{ steps.task_def.outputs.task-definition }}
          service:               ${{ env.ECS_SERVICE }}
          cluster:               ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          # Rolling: ECS respects deployment_minimum_healthy_percent (50%)
          # and deployment_maximum_percent (200%) set in ecs.tf.
          # Circuit breaker in ecs.tf auto-rolls back if health checks fail.

      # ── Optional: invalidate CloudFront after static deploy ──
      # Uncomment and call from a separate frontend workflow if needed.
      # - name: Invalidate CloudFront cache
      #   run: |
      #     aws cloudfront create-invalidation \
      #       --distribution-id ${{ env.CF_DISTRIBUTION }} \
      #       --paths "/*"

      - name: Write job summary
        if: always()
        run: |
          echo "## ECS Deployment" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ needs.build-and-push.outputs.image_uri }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Cluster | \`${{ env.ECS_CLUSTER }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Service | \`${{ env.ECS_SERVICE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
